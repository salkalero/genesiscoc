<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Génesis</title>
    
    <link rel="icon" type="image/webp" href="/recursos/img/escudoClanGenesis.webp">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Ubuntu:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style-admin.css">
</head>
<body>

    <div id="customMsg"></div>

    <div id="adminForm" class="coc-panel p-6">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <a href="normas.html" title="Volver">
                    <img src="/recursos/img/escudoClanGenesis.webp" onerror="this.src='https://api.dicebear.com/7.x/shapes/svg?seed=genesis'" alt="Escudo" class="w-12 h-12 object-contain hover:scale-110 transition-transform">
                </a>
                <h1 class="coc-font text-2xl text-amber-900 uppercase italic">Bitácora de Guerra</h1>
            </div>
            <a href="normas.html" class="bg-amber-800 text-white text-[10px] font-bold px-3 py-1 rounded-lg border-b-2 border-black">VOLVER</a>
        </div>

        <div class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-black/5 p-4 rounded-xl">
                <div>
                    <label class="block text-[10px] font-black uppercase mb-1">Categoría</label>
                    <select id="eventType" class="input-coc py-2">
                        <option value="diaria">Guerra Diaria</option>
                        <option value="liga">Liga de Clanes</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase mb-1">Fecha del Evento</label>
                    <input type="text" id="eventDate" placeholder="Ej: 30 Mar 2026" class="input-coc py-2">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-[10px] font-black uppercase mb-1">Nombre del Enfrentamiento</label>
                    <input type="text" id="eventTitle" placeholder="Ej: Génesis vs Los Invencibles" class="input-coc py-2">
                </div>
            </div>

            <div class="bg-black/5 p-4 rounded-xl">
                <h3 class="coc-font text-lg mb-4 text-amber-900 uppercase italic">Guerreros y Cambios</h3>
                <div id="playersList" class="space-y-3 mb-4 max-h-[40vh] overflow-y-auto pr-2"></div>
                <button id="addPlayerBtn" class="btn-add btn-coc py-2 px-4 rounded-lg text-xs font-bold uppercase">
                    + Añadir Guerrero
                </button>
            </div>

            <!-- Campo de Clave para validación de Firebase Rules -->
            <div class="bg-amber-900/10 p-4 rounded-xl border-2 border-amber-900/20">
                <label class="block text-[10px] font-black uppercase text-amber-900 mb-2 text-center tracking-widest">Firma de Comandante</label>
                <input type="password" id="masterKey" placeholder="Clave secreta" class="input-coc text-center border-amber-900/40">
            </div>

            <button id="publishBtn" class="w-full btn-coc coc-font py-4 rounded-xl text-xl uppercase italic tracking-widest">
                Publicar Cambios
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBIO9an0ZFAMdvJNOuV_Mb6ulZzVego_N8",
            authDomain: "comentariosgeminis-coc.firebaseapp.com",
            projectId: "comentariosgeminis-coc",
            storageBucket: "comentariosgeminis-coc.firebasestorage.app",
            messagingSenderId: "227180378242",
            appId: "1:227180378242:web:7ab611322962fba91fdc9b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = 'genesis-coc';

        const customMsg = document.getElementById('customMsg');

        function showMsg(text, isError = false) {
            customMsg.innerText = text;
            customMsg.style.borderColor = isError ? '#b91c1c' : '#fcc200';
            customMsg.style.display = 'block';
            setTimeout(() => { customMsg.style.display = 'none'; }, 3000);
        }

        // Función para obtener la IP del usuario
        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (e) { return "IP-Oculta"; }
        }

        function createPlayerRow() {
            const div = document.createElement('div');
            div.className = "p-3 bg-white/80 rounded-xl border-2 border-amber-900/10 flex flex-col gap-2 relative";
            div.innerHTML = `
                <button class="absolute top-1 right-2 text-red-600 font-bold text-xs" onclick="this.parentElement.remove()">X</button>
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" placeholder="Nombre" class="p-2 rounded border text-sm font-bold pName">
                    <select class="p-2 rounded border font-bold text-xs pStatus">
                        <option value="ascenso">🏆 Ascenso</option>
                        <option value="penalizacion">💀 Penalización</option>
                        <option value="degradacion">⏳ Degradación</option>
                    </select>
                </div>
                <input type="text" placeholder="Motivo..." class="w-full p-2 rounded border text-[10px] pDesc">
            `;
            document.getElementById('playersList').appendChild(div);
        }

        document.getElementById('addPlayerBtn').onclick = createPlayerRow;
        createPlayerRow();

        document.getElementById('publishBtn').onclick = async () => {
            const type = document.getElementById('eventType').value;
            const date = document.getElementById('eventDate').value.trim();
            const title = document.getElementById('eventTitle').value.trim();
            const key = document.getElementById('masterKey').value.trim();

            if (!title || !date || !key) return showMsg("Rellena todos los campos", true);

            const players = [];
            document.querySelectorAll('#playersList > div').forEach(row => {
                const name = row.querySelector('.pName').value.trim();
                if (name) {
                    players.push({
                        name: name,
                        statusType: row.querySelector('.pStatus').value,
                        desc: row.querySelector('.pDesc').value.trim()
                    });
                }
            });

            if (players.length === 0) return showMsg("Añade al menos un guerrero", true);

            const btn = document.getElementById('publishBtn');
            btn.disabled = true;
            btn.innerText = 'VALIDANDO...';

            // 1. CAPTURAR INFORMACIÓN DE TRAZABILIDAD (PARA TODOS LOS INTENTOS)
            const ip = await getIP();
            const trazabilidad = {
                ip: ip,
                userAgent: navigator.userAgent,
                timestamp: new Date().toISOString(),
                intentKey: key, // Guardamos la clave que intentó usar
                eventTitle: title
            };

            try {
                await signInAnonymously(auth);

                // 2. REGISTRO DE ACTIVIDAD (SIEMPRE SE CREA, ÉXITO O FALLO)
                // Nota: Asegúrate de que las reglas de Firestore permitan escribir en 'registro_actividad' sin clave.
                const logRef = collection(db, 'artifacts', appId, 'public', 'data', 'registro_actividad');
                await addDoc(logRef, trazabilidad);

                // 3. INTENTO DE PUBLICACIÓN REAL (ESTO FALLARÁ SI LA CLAVE ES MALA)
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'estatus_eventos');
                await addDoc(colRef, {
                    type, date, title, players,
                    createdAt: serverTimestamp(),
                    clave_secreta: key,
                    _trazabilidad: trazabilidad // También lo guardamos en el documento final si tiene éxito
                });

                showMsg("¡Bitácora actualizada!");
                setTimeout(() => location.reload(), 1500);
            } catch (error) {
                console.error("Error en el proceso:", error);
                // Si llegamos aquí, el 'registro_actividad' ya se guardó, pero la bitácora falló.
                showMsg("CLAVE INCORRECTA. Prueba otra vez", true);
            } finally {
                btn.disabled = false;
                btn.innerText = 'Publicar Cambios';
            }
        };
    </script>
</body>
</html>
