<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clan - Aldeas en Construcción</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fuente con estilo de juego cartoon -->
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Ubuntu:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --coc-green: #4e9421;
            --coc-dark-green: #3a7217;
            --coc-gold: #fcc200;
            --coc-wood: #8b4513;
        }

        body {
            font-family: 'Ubuntu', sans-serif;
            background: radial-gradient(circle, var(--coc-green) 0%, var(--coc-dark-green) 100%);
        }

        .coc-font {
            font-family: 'Luckiest Guy', cursive;
            text-shadow: 3px 3px 0px #000, -1px -1px 0px #000, 1px -1px 0px #000, -1px 1px 0px #000, 1px 1px 0px #000;
            letter-spacing: 2px;
        }

        /* Estilo de la caja tipo UI de Clash of Clans */
        .coc-panel {
            background: #e6cc9e;
            border: 6px solid #5d3a1a;
            box-shadow: 0 10px 0 #3a2410, inset 0 0 20px rgba(0,0,0,0.1);
            position: relative;
        }

        .coc-header {
            background: linear-gradient(to bottom, #7d522a, #5d3a1a);
            border-bottom: 4px solid #3a2410;
            margin: -6px -6px 0 -6px;
            padding: 10px;
            border-radius: 4px 4px 0 0;
        }

        /* Animación del martillo */
        @keyframes hammer {
            0% { transform: rotate(0deg); }
            20% { transform: rotate(-30deg); }
            100% { transform: rotate(0deg); }
        }
        .hammer-anim {
            animation: hammer 0.8s infinite ease-in-out;
            transform-origin: bottom right;
        }

        /* Barra de progreso tipo "Upgrade" */
        .upgrade-bar {
            height: 24px;
            background: #333;
            border: 2px solid #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }
        .upgrade-fill {
            width: 65%;
            height: 100%;
            background: linear-gradient(to bottom, #a55eea, #8854d0); /* Color Elixir */
            border-right: 2px solid #000;
        }

        .grass-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%233a7217' fill-opacity='0.2' fill-rule='evenodd'%3E%3Ccircle cx='3' cy='3' r='3'/%3E%3Ccircle cx='13' cy='13' r='3'/%3E%3C/g%3E%3C/svg%3E");
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 grass-pattern">

    <div class="max-w-lg w-full">
        <!-- Logo / Título del Clan -->
        <div class="text-center mb-10">
            <h1 class="coc-font text-5xl md:text-6xl text-white mb-2 uppercase italic">¡ALDEA EN MEJORA!</h1>
            <div class="flex justify-center gap-4">
                <div class="w-12 h-12 bg-yellow-400 border-4 border-yellow-600 rounded-full flex items-center justify-center shadow-lg">
                    <span class="text-yellow-900 font-bold text-xl">🏆</span>
                </div>
                <div class="w-12 h-12 bg-purple-500 border-4 border-purple-700 rounded-full flex items-center justify-center shadow-lg">
                    <span class="text-white font-bold text-xl">💧</span>
                </div>
            </div>
        </div>

        <!-- Panel de Mensaje -->
        <div class="coc-panel rounded-lg p-6 text-center">
            <div class="coc-header">
                <h2 class="text-white text-xl font-bold uppercase tracking-wider">Estado del Clan</h2>
            </div>
            
            <div class="py-8 px-4">
                <!-- Icono de Constructor -->
                <div class="relative inline-block mb-6">
                    <div class="bg-gray-800 rounded-full p-6 border-4 border-gray-600 shadow-inner">
                        <svg class="w-16 h-16 text-yellow-500 hammer-anim" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M19.5,4C18.1,4 17,5.1 17,6.5V7H13.5V6.5C13.5,5.1 12.4,4 11,4C9.6,4 8.5,5.1 8.5,6.5V7H5V6.5C5,5.1 3.9,4 2.5,4C1.1,4 0,5.1 0,6.5C0,7.9 1.1,9 2.5,9H3.5L4.5,14H2.5C1.1,14 0,15.1 0,16.5C0,17.9 1.1,19 2.5,19H21.5C22.9,19 24,17.9 24,16.5C24,15.1 22.9,14 21.5,14H19.5L20.5,9H21.5C22.9,9 24,7.9 24,6.5C24,5.1 22.9,4 21.5,4H19.5M10.5,7V6.5C10.5,6.2 10.7,6 11,6C11.3,6 11.5,6.2 11.5,6.5V7H10.5M7,7V6.5C7,6.2 7.2,6 7.5,6C7.8,6 8,6.2 8,6.5V7H7Z"/>
                        </svg>
                    </div>
                    <span class="absolute -top-2 -right-2 bg-red-600 text-white text-xs font-bold px-2 py-1 rounded-full border-2 border-white uppercase">Mejorando</span>
                </div>

                <p class="text-gray-900 text-2xl font-black uppercase mb-4 leading-tight" style="color: #3a2410;">
                    Estamos construyendo las aldeas del clan
                </p>
                <p class="text-gray-700 text-lg font-bold mb-8 italic">
                    En breve estaremos disponible
                </p>

                <!-- Barra de Progreso -->
                <div class="space-y-2">
                    <div class="flex justify-between text-sm font-bold text-gray-800 uppercase px-1">
                        <span>Progreso del Clan</span>
                        <span>65%</span>
                    </div>
                    <div class="upgrade-bar">
                        <div class="upgrade-fill"></div>
                    </div>
                </div>
            </div>

            <div class="mt-4 pt-4 border-t-2 border-gray-400 border-dashed">
                <p class="text-gray-600 text-xs font-bold uppercase tracking-widest">
                    ¡Prepara tus tropas para la batalla!
                </p>
            </div>
        </div>

        <!-- Botón decorativo -->
        <div class="mt-8 flex justify-center">
            <button class="bg-blue-500 hover:bg-blue-600 text-white border-b-8 border-blue-800 px-10 py-3 rounded-xl coc-font text-2xl transition-all active:border-b-0 active:translate-y-2">
                ¡VOLVERÉ!
            </button>
        </div>
    </div>

</body>
</html>
