<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de obras del Clan Genesis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Ubuntu:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style-construccion.css">
</head>
<body class="min-h-screen p-4 grass-pattern">

    <div class="max-w-lg w-full">
        <!-- Título Superior -->
        <div class="text-center mb-10">
            <h1 class="coc-font text-5xl md:text-6xl text-white mb-4 uppercase italic leading-none">¡ALDEA EN MEJORA!</h1>
            <div class="flex justify-center gap-6">
                <div class="w-14 h-14 bg-yellow-400 border-4 border-yellow-600 rounded-xl flex items-center justify-center shadow-xl transform -rotate-12">
                    <span class="text-3xl">🏆</span>
                </div>
                <div class="w-14 h-14 bg-purple-500 border-4 border-purple-700 rounded-xl flex items-center justify-center shadow-xl transform rotate-12">
                    <span class="text-3xl">💧</span>
                </div>
            </div>
        </div>

        <!-- Panel de Construcción -->
        <div class="coc-panel rounded-2xl overflow-hidden shadow-2xl">
            <div class="coc-header text-center">
                <h2 class="text-white text-lg font-bold uppercase tracking-widest text-xs">Mejorando Estructuras del Clan</h2>
            </div>
            
            <div class="p-8 text-center">
                <!-- Escena de Construcción Corregida -->
                <div class="h-64 flex flex-col items-center justify-end mb-6 relative">
                    
                    <!-- Mazo Pesado con Eje Desplazado -->
                    <div class="hammer-container">
                        <svg width="100" height="100" viewBox="0 0 100 100">
                            <!-- Mango -->
                            <rect x="44" y="45" width="12" height="45" rx="6" fill="#5D3A1A" stroke="#2A1808" stroke-width="2" />
                            <!-- Cabeza de Mazo -->
                            <rect x="15" y="10" width="70" height="40" rx="4" fill="#3A2410" stroke="#1A0F06" stroke-width="3" />
                            <!-- Detalles de Oro -->
                            <rect x="15" y="10" width="12" height="40" fill="#5D3A1A" opacity="0.4" />
                            <rect x="73" y="10" width="12" height="40" fill="#5D3A1A" opacity="0.4" />
                            <circle cx="21" cy="20" r="3" fill="#FBBF24" />
                            <circle cx="21" cy="40" r="3" fill="#FBBF24" />
                            <circle cx="79" cy="20" r="3" fill="#FBBF24" />
                            <circle cx="79" cy="40" r="3" fill="#FBBF24" />
                        </svg>
                    </div>

                    <!-- Mesa de Constructor -->
                    <div class="table-container">
                        <svg width="180" height="80" viewBox="0 0 180 80">
                            <ellipse cx="90" cy="75" rx="70" ry="5" fill="black" fill-opacity="0.1" />
                            <!-- Patas -->
                            <rect x="40" y="30" width="15" height="45" fill="#5D3A1A" stroke="#2A1808" stroke-width="2" />
                            <rect x="125" y="30" width="15" height="45" fill="#5D3A1A" stroke="#2A1808" stroke-width="2" />
                            <!-- Tablero -->
                            <rect x="10" y="15" width="160" height="20" rx="2" fill="#8B4513" stroke="#3A2410" stroke-width="3" />
                            <!-- Marca de impacto central -->
                            <ellipse cx="90" cy="25" rx="15" ry="3" fill="#5D3A1A" opacity="0.3" />
                        </svg>
                    </div>
                </div>

                <p class="text-3xl font-black text-amber-900 uppercase mb-2 italic">Estamos construyendo las aldeas del clan</p>
                <p class="text-amber-800 font-bold italic mb-8">En breve estaremos disponibles</p>

                <!-- Barra de Mejora Móvil (32%) -->
                <div class="space-y-3 mb-4">
                    <div class="flex justify-between items-end px-2">
                        <span class="text-xs font-black text-amber-900 uppercase tracking-tighter">Estado de la mejora</span>
                        <div class="flex items-center gap-2">
                            <span class="text-2xl font-black text-amber-900">32%</span>
                            <div class="w-5 h-5 bg-purple-600 rounded-full border-2 border-black shadow-md animate-pulse"></div>
                        </div>
                    </div>
                    <div class="upgrade-bar">
                        <div class="upgrade-fill"></div>
                    </div>
                </div>
            </div>

            <!-- Información del Tiempo -->
            <div class="bg-amber-100/40 p-4 border-t-2 border-amber-300 border-dashed">
                <div class="text-center">
                    <span class="block text-[10px] uppercase font-black text-amber-600">Tiempo de Construcción</span>
                    <span class="block font-black text-amber-900 text-lg uppercase tracking-wider">&infin;</span>
                </div>
            </div>
        </div>

        <p class="mt-8 text-center text-white/50 text-xs font-bold uppercase tracking-widest">
            Genesis CoC &copy; 2026
        </p>
    </div>

</body>
</html>
